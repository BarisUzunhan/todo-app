<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulaması</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    header {
      background: #4f46e5;
      color: #fff;
      padding: 24px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    header p {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-top: 4px;
    }

    .input-area {
      padding: 20px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
    }

    .input-area input {
      flex: 1;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #4f46e5;
    }

    .input-area button {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .input-area button:hover {
      background: #4338ca;
    }

    .filters {
      display: flex;
      gap: 6px;
      padding: 14px 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .filters button {
      background: none;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      color: #6b7280;
      transition: all 0.2s;
    }

    .filters button.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    .todo-list {
      list-style: none;
      min-height: 60px;
    }

    .todo-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid #f3f4f6;
      transition: background 0.15s;
    }

    .todo-list li:hover {
      background: #fafafa;
    }

    .todo-list li.done .todo-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .todo-list li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 0.95rem;
      color: #1f2937;
      word-break: break-word;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #d1d5db;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #ef4444;
    }

    .empty {
      text-align: center;
      padding: 32px;
      color: #9ca3af;
      font-size: 0.9rem;
    }

    footer {
      padding: 12px 20px;
      font-size: 0.8rem;
      color: #9ca3af;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #e5e7eb;
    }

    footer button {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 0.8rem;
    }

    footer button:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Yapılacaklar</h1>
      <p id="date"></p>
    </header>

    <div class="input-area">
      <input type="text" id="todoInput" placeholder="Yeni görev ekle..." maxlength="120">
      <button onclick="addTodo()">Ekle</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">Tümü</button>
      <button onclick="setFilter('active', this)">Aktif</button>
      <button onclick="setFilter('done', this)">Tamamlanan</button>
    </div>

    <ul class="todo-list" id="todoList"></ul>

    <footer>
      <span id="remaining"></span>
      <button onclick="clearDone()">Tamamlananları temizle</button>
    </footer>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    document.getElementById('date').textContent = new Date().toLocaleDateString('tr-TR', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    document.getElementById('todoInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggleTodo(id) {
      todos = todos.map(t => t.id === id ? { ...t, done: !t.done } : t);
      save();
      render();
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('todoList');
      const active = todos.filter(t => !t.done).length;

      document.getElementById('remaining').textContent =
        `${active} görev kaldı`;

      const visible = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      if (visible.length === 0) {
        list.innerHTML = '<li class="empty">Görev yok</li>';
        return;
      }

      list.innerHTML = visible.map(t => `
        <li class="${t.done ? 'done' : ''}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id})">
          <span class="todo-text">${escapeHtml(t.text)}</span>
          <button class="delete-btn" onclick="deleteTodo(${t.id})">✕</button>
        </li>
      `).join('');
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    render();
  </script>
</body>
</html>
