<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulaması</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    header {
      background: #4f46e5;
      color: #fff;
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 { font-size: 1.5rem; font-weight: 700; }
    header p { font-size: 0.78rem; opacity: 0.75; margin-top: 3px; }

    .logout-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      white-space: nowrap;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.3); }

    /* AUTH SCREEN */
    .auth-screen {
      padding: 32px 28px;
    }

    .auth-screen h2 {
      font-size: 1.2rem;
      color: #1f2937;
      margin-bottom: 6px;
    }

    .auth-screen .subtitle {
      font-size: 0.85rem;
      color: #6b7280;
      margin-bottom: 24px;
    }

    .auth-screen label {
      display: block;
      font-size: 0.82rem;
      color: #374151;
      margin-bottom: 5px;
      font-weight: 600;
    }

    .auth-screen input {
      width: 100%;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .auth-screen input:focus { border-color: #4f46e5; }

    .auth-btn {
      width: 100%;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 12px;
    }

    .auth-btn:hover { background: #4338ca; }
    .auth-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    .auth-switch {
      text-align: center;
      font-size: 0.85rem;
      color: #6b7280;
    }

    .auth-switch a {
      color: #4f46e5;
      cursor: pointer;
      text-decoration: underline;
    }

    .notice {
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    .notice.success { background: #d1fae5; color: #065f46; }
    .notice.error   { background: #fee2e2; color: #991b1b; }
    .notice.info    { background: #e0e7ff; color: #3730a3; }

    /* TODO APP */
    .input-area {
      padding: 20px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
    }

    .input-area input {
      flex: 1;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus { border-color: #4f46e5; }

    .input-area button {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .input-area button:hover { background: #4338ca; }

    .filters {
      display: flex;
      gap: 6px;
      padding: 14px 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .filters button {
      background: none;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      color: #6b7280;
      transition: all 0.2s;
    }

    .filters button.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    .todo-list { list-style: none; min-height: 60px; }

    .todo-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid #f3f4f6;
      transition: background 0.15s;
    }

    .todo-list li:hover { background: #fafafa; }

    .todo-list li.done .todo-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .todo-list li input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 0.95rem;
      color: #1f2937;
      word-break: break-word;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #d1d5db;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #ef4444; }

    .empty {
      text-align: center;
      padding: 32px;
      color: #9ca3af;
      font-size: 0.9rem;
    }

    footer {
      padding: 12px 20px;
      font-size: 0.8rem;
      color: #9ca3af;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #e5e7eb;
    }

    footer button {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 0.8rem;
    }

    footer button:hover { text-decoration: underline; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="container">

  <!-- AUTH SCREEN -->
  <div id="authScreen" class="auth-screen">
    <h2 id="authTitle">Giriş Yap</h2>
    <p class="subtitle" id="authSubtitle">Görevlerine ulaşmak için giriş yap.</p>

    <div id="authNotice" class="notice hidden"></div>

    <form id="authForm" onsubmit="submitAuth(); return false;" autocomplete="on">
      <label>E-posta</label>
      <input type="email" id="authEmail" placeholder="ornek@mail.com" autocomplete="username">

      <label>Şifre</label>
      <input type="password" id="authPassword" placeholder="En az 6 karakter" autocomplete="current-password">

      <button type="submit" class="auth-btn" id="authSubmit">Giriş Yap</button>
    </form>

    <p class="auth-switch">
      <span id="authSwitchText">Hesabın yok mu?</span>
      <a onclick="toggleMode()"> <span id="authSwitchLink">Kayıt Ol</span></a>
    </p>
  </div>

  <!-- TODO APP -->
  <div id="appScreen" class="hidden">
    <header>
      <div>
        <h1>Yapılacaklar</h1>
        <p id="userEmail"></p>
      </div>
      <button class="logout-btn" onclick="logout()">Çıkış Yap</button>
    </header>

    <div class="input-area">
      <input type="text" id="todoInput" placeholder="Yeni görev ekle..." maxlength="120" autocomplete="off">
      <button onclick="addTodo()">Ekle</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">Tümü</button>
      <button onclick="setFilter('active', this)">Aktif</button>
      <button onclick="setFilter('done', this)">Tamamlanan</button>
    </div>

    <ul class="todo-list" id="todoList"></ul>

    <footer>
      <span id="remaining"></span>
      <button onclick="clearDone()">Tamamlananları temizle</button>
    </footer>
  </div>

</div>

<script>
  const SUPABASE_URL = 'https://zkqdlyyjgmqzjyzvmyms.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InprcWRseXlqZ21xemp5enZteW1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTg2MTIsImV4cCI6MjA5MjI3NDYxMn0.MzNa_nrS33-74YVzXh_AKQa8fQ0VHV9iAV4q9dHnGdQ';

  let session = null;
  let todos = [];
  let filter = 'all';
  let isRegisterMode = false;

  function apiHeaders(token) {
    return {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${token || SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };
  }

  /* ── AUTH ── */

  function toggleMode() {
    isRegisterMode = !isRegisterMode;
    document.getElementById('authTitle').textContent       = isRegisterMode ? 'Kayıt Ol' : 'Giriş Yap';
    document.getElementById('authSubtitle').textContent    = isRegisterMode ? 'Yeni hesap oluştur.' : 'Görevlerine ulaşmak için giriş yap.';
    document.getElementById('authSubmit').textContent      = isRegisterMode ? 'Kayıt Ol' : 'Giriş Yap';
    document.getElementById('authSwitchText').textContent  = isRegisterMode ? 'Zaten hesabın var mı?' : 'Hesabın yok mu?';
    document.getElementById('authSwitchLink').textContent  = isRegisterMode ? 'Giriş Yap' : 'Kayıt Ol';
    document.getElementById('authPassword').autocomplete   = isRegisterMode ? 'new-password' : 'current-password';
    hideNotice();
  }

  function showNotice(type, msg) {
    const el = document.getElementById('authNotice');
    el.className = `notice ${type}`;
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  function hideNotice() {
    document.getElementById('authNotice').classList.add('hidden');
  }

  async function submitAuth() {
    const email    = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    const btn      = document.getElementById('authSubmit');

    if (!email || !password) { showNotice('error', 'E-posta ve şifre boş bırakılamaz.'); return; }
    if (password.length < 6) { showNotice('error', 'Şifre en az 6 karakter olmalı.'); return; }

    btn.disabled = true;
    hideNotice();

    if (isRegisterMode) {
      const res  = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        showNotice('error', data.msg || data.error_description || 'Kayıt başarısız.');
      } else {
        showNotice('success', 'Kaydınız alındı! E-postanıza gelen onay linkine tıklayın.');
        document.getElementById('authEmail').value    = '';
        document.getElementById('authPassword').value = '';
      }
    } else {
      const res  = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        showNotice('error', data.error_description || data.msg || 'Giriş başarısız.');
      } else {
        saveSession(data);
        showApp(data.user.email);
        fetchTodos();
      }
    }

    btn.disabled = false;
  }

  async function logout() {
    if (session) {
      await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${session.access_token}` }
      });
    }
    clearSession();
    showAuth();
  }

  function saveSession(data) {
    session = data;
    localStorage.setItem('sb_session', JSON.stringify({
      access_token: data.access_token,
      refresh_token: data.refresh_token,
      expires_at: Date.now() + data.expires_in * 1000,
      user: data.user
    }));
  }

  function clearSession() {
    session = null;
    localStorage.removeItem('sb_session');
  }

  async function restoreSession() {
    const raw = localStorage.getItem('sb_session');
    if (!raw) return false;
    const saved = JSON.parse(raw);

    if (Date.now() < saved.expires_at - 60000) {
      session = saved;
      return true;
    }

    const res  = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: saved.refresh_token })
    });
    if (!res.ok) { clearSession(); return false; }
    const data = await res.json();
    saveSession(data);
    return true;
  }

  /* Handle email confirmation redirect — Supabase appends tokens in the hash */
  async function handleHashTokens() {
    const hash   = window.location.hash.slice(1);
    if (!hash) return false;
    const params = Object.fromEntries(new URLSearchParams(hash));
    if (params.type === 'signup' && params.access_token) {
      saveSession({ access_token: params.access_token, refresh_token: params.refresh_token, expires_in: 3600, user: { email: params.email || '' } });
      history.replaceState(null, '', window.location.pathname);
      showNotice('success', 'E-posta doğrulandı! Giriş yapılıyor…');
      const userRes = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${params.access_token}` }
      });
      const user = await userRes.json();
      session.user = user;
      localStorage.setItem('sb_session', JSON.stringify(session));
      showApp(user.email);
      fetchTodos();
      return true;
    }
    return false;
  }

  /* ── UI ── */

  function showApp(email) {
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('appScreen').classList.remove('hidden');
    document.getElementById('userEmail').textContent = email;
  }

  function showAuth() {
    document.getElementById('appScreen').classList.add('hidden');
    document.getElementById('authScreen').classList.remove('hidden');
    todos = [];
    render();
  }

  /* ── TODOS ── */

  async function fetchTodos() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/todos?order=created_at.desc`, {
      headers: apiHeaders(session.access_token)
    });
    todos = await res.json();
    render();
  }

  async function addTodo() {
    const input = document.getElementById('todoInput');
    const text  = input.value.trim();
    if (!text) return;
    input.value    = '';
    input.disabled = true;

    const res = await fetch(`${SUPABASE_URL}/rest/v1/todos`, {
      method: 'POST',
      headers: apiHeaders(session.access_token),
      body: JSON.stringify({ text, done: false, user_id: session.user.id })
    });
    const [newTodo] = await res.json();
    todos.unshift(newTodo);
    input.disabled = false;
    input.focus();
    render();
  }

  async function toggleTodo(id) {
    const todo = todos.find(t => t.id === id);
    const res  = await fetch(`${SUPABASE_URL}/rest/v1/todos?id=eq.${id}`, {
      method: 'PATCH',
      headers: apiHeaders(session.access_token),
      body: JSON.stringify({ done: !todo.done })
    });
    const [updated] = await res.json();
    todos = todos.map(t => t.id === id ? updated : t);
    render();
  }

  async function deleteTodo(id) {
    await fetch(`${SUPABASE_URL}/rest/v1/todos?id=eq.${id}`, {
      method: 'DELETE',
      headers: apiHeaders(session.access_token)
    });
    todos = todos.filter(t => t.id !== id);
    render();
  }

  async function clearDone() {
    await fetch(`${SUPABASE_URL}/rest/v1/todos?done=eq.true&user_id=eq.${session.user.id}`, {
      method: 'DELETE',
      headers: apiHeaders(session.access_token)
    });
    todos = todos.filter(t => !t.done);
    render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const list   = document.getElementById('todoList');
    const active = todos.filter(t => !t.done).length;
    document.getElementById('remaining').textContent = `${active} görev kaldı`;

    const visible = todos.filter(t => {
      if (filter === 'active') return !t.done;
      if (filter === 'done')   return t.done;
      return true;
    });

    if (visible.length === 0) {
      list.innerHTML = '<li class="empty">Görev yok</li>';
      return;
    }

    list.innerHTML = visible.map(t => `
      <li class="${t.done ? 'done' : ''}">
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id})">
        <span class="todo-text">${escapeHtml(t.text)}</span>
        <button class="delete-btn" onclick="deleteTodo(${t.id})">✕</button>
      </li>
    `).join('');
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('todoInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });


  /* ── INIT ── */
  (async () => {
    const handled = await handleHashTokens();
    if (handled) return;
    const ok = await restoreSession();
    if (ok) {
      showApp(session.user.email);
      fetchTodos();
    }
  })();
</script>
</body>
</html>
